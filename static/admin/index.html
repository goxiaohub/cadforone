<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .login-btn {
      display: inline-block; padding: 12px 24px; background: #2ea44f;
      color: white; text-decoration: none; border-radius: 6px; font-size: 16px;
      margin: 20px 0; cursor: pointer;
    }
    .login-btn:hover { background: #2c974b; }
    .login-container {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 80vh; text-align: center;
    }
  </style>
</head>
<body>
  <script>
    // ⚠️ THIS MUST RUN BEFORE Decap CMS loads
    // Prevent Decap CMS from auto-initializing - we handle auth ourselves
    window.CMS_MANUAL_INIT = true;

    // Check if we just returned from GitHub OAuth with a token
    (function() {
      try {
        var hash = window.location.hash;
        if (hash && hash.indexOf('token=') !== -1) {
          var tokenMatch = hash.match(/token=([^&]+)/);
          if (tokenMatch) {
            var tokenData = JSON.parse(decodeURIComponent(tokenMatch[1]));
            if (tokenData && tokenData.access_token) {
              // Store token so Decap CMS can use it
              localStorage.setItem('decap-cms-github-token', tokenData.access_token);
              // Clean the URL hash
              window.location.hash = '';
              // Redirect to admin without token in URL
              window.location.replace('/admin/');
            }
          }
        }
      } catch(e) {
        console.warn('Token processing error:', e);
      }
    })();
  </script>

  <!-- Load Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>

  <!-- Custom auth handler and UI -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      function init() {
        if (typeof CMS === 'undefined' || !CMS.init) {
          setTimeout(init, 300);
          return;
        }

        var savedToken = localStorage.getItem('decap-cms-github-token');

        if (savedToken) {
          // We have a stored token — initialize Decap CMS
          CMS.init();
        } else {
          // No token — show custom login page
          document.body.innerHTML = '<div class="login-container">' +
            '<h2>Content Manager</h2>' +
            '<p>Sign in with GitHub to manage your tutorials.</p>' +
            '<a class="login-btn" href="/api/auth">Login with GitHub</a>' +
            '</div>';
        }
      }
      init();
    });
  </script>
</body>
</html>
